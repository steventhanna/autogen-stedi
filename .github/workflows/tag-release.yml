name: Tag & Publish on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'update/stedi-spec-')
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.tag.outputs.created }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  # Publishing runs as a second job in the same workflow (not a separate tag-triggered
  # workflow): a tag pushed with the default GITHUB_TOKEN does not trigger `on: push: tags`,
  # so a standalone publish workflow would never fire. Gated on a tag actually being created.
  publish:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.version }}  # publish exactly the tagged commit
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

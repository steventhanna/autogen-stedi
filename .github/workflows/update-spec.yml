name: Update Stedi API Specs

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize runs so two overlapping spec updates can't both branch from the same
# base version and race on the version bump / PR creation.
concurrency:
  group: stedi-spec-update
  cancel-in-progress: false

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/openapi-generator
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Record previous spec hash
        id: prev
        run: echo "old=$(cat SPEC_HASH)" >> "$GITHUB_OUTPUT"

      - name: Regenerate from latest specs
        run: ./generate.sh  # fetches specs + pinned generator JAR, rewrites SPEC_HASH, regenerates, cargo-checks

      - name: Detect changes
        id: diff
        env:
          OLD_HASH: ${{ steps.prev.outputs.old }}
        run: |
          # Gate strictly on the spec hash, not `git status`: cargo check can touch Cargo.lock
          # on its own, which must not masquerade as an upstream spec change.
          NEW_HASH=$(cat SPEC_HASH)
          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Specs unchanged ($NEW_HASH)."
            git checkout -- . 2>/dev/null || true  # discard any incidental Cargo.lock churn
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new=$NEW_HASH" >> "$GITHUB_OUTPUT"
            echo "short=$(cut -c1-12 SPEC_HASH)" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        if: steps.diff.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: update/stedi-spec-${{ steps.diff.outputs.short }}
        run: |
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          echo "exists=$( [ -n "$EXISTING" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Bump version
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.exists != 'true'
        run: ./scripts/bump-version.sh

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: update/stedi-spec-${{ steps.diff.outputs.short }}
          OLD_HASH: ${{ steps.prev.outputs.old }}
          NEW_HASH: ${{ steps.diff.outputs.new }}
        run: |
          NEWVER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: update to latest Stedi specs ($NEWVER)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update to latest Stedi specs ($NEWVER)" \
            --body "Combined spec hash \`$OLD_HASH\` -> \`$NEW_HASH\`. cargo check passed. Generated by the spec-update workflow." \
            --base main
